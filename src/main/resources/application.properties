spring.application.name=stepmate_back

# === DataSource ===
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/stepmate_db
spring.datasource.username=postgres
spring.datasource.password=1234

# === JPA ===
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# === Server ===
server.port=8080

# === Google OAuth ===
# 콤마로 여러 Client ID 등록 가능.
# - Android Client ID (필수: google-sign-in 이 idToken 발급 시 audience 로 사용)
# - Web Client ID (선택: 프론트에서 serverClientId 로 지정한 경우)
# 비어 있으면 모든 토큰 검증이 거부됩니다.
